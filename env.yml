name: intro-to-clm-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - joblib
  - rdkit
  - regex
  - pillow
  - tqdm
  - ipython
  - jupyter
  - pip:
    - tensorflow==2.17
    - keras==3.4.1
    - tensorboard==2.17